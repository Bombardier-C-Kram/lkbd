name: Build Packages

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: dyalog/dyalog:20.0
      options: --user root
    steps:
      - name: Install Dependencies
        run: |
          apt-get update && apt-get install -y nodejs curl

      - uses: actions/checkout@v4

      - name: Generate layouts
        run: |
          mkdir -p OUTLAYOUT
          chmod +x ./build.apls
          ./build.apls

      - name: Install nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_linux_x86_64.tar.gz | tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build packages
        run: |
          cd packaging
          chmod +x build.sh
          ./build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packaging/dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*
